<script>
/* ------------------------------
   YEAR
------------------------------ */
document.getElementById("year").textContent = new Date().getFullYear();

/* ------------------------------
   UPGRADE BUTTONS
------------------------------ */
function upgradeStandard(){
  localStorage.setItem("resupal_plan","standard");
  updatePlanBadge();
  window.location.href = STRIPE_STANDARD;
}

function upgradePro(){
  localStorage.setItem("resupal_plan","pro");
  updatePlanBadge();
  window.location.href = STRIPE_PRO;
}

/* ------------------------------
   UNBLUR WHEN PLAN CHANGES
------------------------------ */
function applyBlurState(){
  const plan = getPlan();
  const output = document.getElementById("aiOutput");
  const overlay = document.getElementById("blurOverlay");

  if(!output) return;

  if(plan === "free"){
    output.classList.add("blurred");
    overlay.style.display = "flex";
  } else {
    output.classList.remove("blurred");
    overlay.style.display = "none";
  }
}

applyBlurState();
</script>
